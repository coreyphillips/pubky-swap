name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / build / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # protoc is needed to compile the LND backend (feature `lnd`).
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (default + all feature combos)
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo clippy -p swap-common --features electrum,bdk-wallet --all-targets -- -D warnings
          cargo clippy -p swap-provider --features full --all-targets -- -D warnings
          cargo clippy -p swap-client --features full --all-targets -- -D warnings

      - name: Build (default + full)
        run: |
          cargo build --all
          cargo build -p swap-provider --features full
          cargo build -p swap-client --features full

      - name: Unit tests
        run: cargo test --all
